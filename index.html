    <script>
      // Force window.fetch to be configurable and writable to prevent iframe sandboxes/extensions from throwing read-only errors
      (function() {
        var originalFetch = window.fetch;
        var currentFetch = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return currentFetch;
            },
            set: function(newValue) {
              currentFetch = newValue;
            }
          });
        } catch (e) {
          console.warn("Prevented crash on window.fetch modification attempt:", e);
        }
      })();
    </script>
